<style>
*{box-sizing:border-box}
body{
  margin:0;

  color:#fff;
}
.layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  padding:20px;
}
.game{
  width:100%;
  max-width:780px;
  background:rgba(0,0,0,.68);
  border:2px solid #c084fc;
  border-radius:18px;
  padding:26px;
  box-shadow:0 14px 40px rgba(0,0,0,.45),0 0 25px rgba(192,132,252,.18);
}
h1{
  text-align:center;
  color:#f5d0fe;
  margin-top:0;
  letter-spacing:.04em;
  text-shadow:0 0 12px rgba(216,180,254,.45);
}
.sub{
  text-align:center;
  color:#e9d5ff;
  margin-bottom:24px;
  line-height:1.7;
}
.status{
  display:flex;
  justify-content:space-between;
  color:#f0abfc;
  font-weight:bold;
  margin-bottom:20px;
}
.badge{
  display:inline-block;
  margin-bottom:10px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(192,132,252,.18);
  color:#f5d0fe;
  border:1px solid rgba(216,180,254,.5);
  font-size:.85rem;
  font-weight:bold;
}
.question{
  background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(168,85,247,.12));
  padding:22px;
  border-radius:14px;
  line-height:1.8;
  font-size:1.18rem;
  margin-bottom:20px;
  border-left:6px solid #d946ef;
}
.choices{
  display:grid;
  gap:12px;
}
button{
  border:none;
  border-radius:12px;
  padding:15px;
  font-size:1rem;
  font-weight:bold;
  cursor:pointer;
  background:#f3e8ff;
  color:#2e1065;
  transition:.15s;
}
button:hover{
  background:#faf5ff;
  transform:translateY(-1px);
}
button.correct{
  background:#16a34a;
  color:#fff;
}
button.wrong{
  background:#dc2626;
  color:#fff;
}
button:disabled{
  cursor:not-allowed;
  transform:none;
}
.result{
  margin-top:18px;
  min-height:52px;
  line-height:1.7;
  font-weight:bold;
}
.explain{
  color:#e5e7eb;
  margin-top:8px;
  font-weight:normal;
}
.restart{
  display:none;
  margin-top:20px;
  width:100%;
  background:#9333ea;
  color:#fff;
}
.ad-area{
  width:320px;
  min-width:320px;
  position:sticky;
  top:20px;
}
.ad-box{
  background:rgba(0,0,0,.55);
  border:2px solid #c084fc;
  border-radius:14px;
  padding:12px;
}
.ad-title{
  text-align:center;
  color:#f5d0fe;
  font-weight:bold;
  margin-bottom:10px;
}
.note{
  margin-top:18px;
  color:#cbd5e1;
  font-size:.9rem;
  line-height:1.7;
}
@media(max-width:1000px){
  .layout{flex-direction:column;align-items:center;}
  .ad-area{width:100%;min-width:auto;position:static;}
}
</style>
</head>

    <div id="choices" class="choices"></div>
    <div id="result" class="result"></div>

let questions = [];
let current = 0;
let score = 0;
let lock = false;

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame(){
  questions = shuffle([...quizData]).slice(0,50);
  current = 0;
  score = 0;
  lock = false;
  document.getElementById("restart").style.display = "none";
  showQuestion();
}

function showQuestion(){
  lock = false;
  const q = questions[current];

  document.getElementById("count").textContent = `${current + 1} / 50`;
  document.getElementById("score").textContent = `正解 ${score}`;
  document.getElementById("question").textContent = q.q;
  document.getElementById("result").innerHTML = "";

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";

  shuffle([...q.choices]).forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn, choice);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(button, choice){
  if(lock) return;
  lock = true;

  const q = questions[current];
  const buttons = document.querySelectorAll("#choices button");

  buttons.forEach(btn => {
    btn.disabled = true;
    if(btn.textContent === q.answer){
      btn.classList.add("correct");
    }
  });

  if(choice === q.answer){
    score++;
    button.classList.add("correct");
    document.getElementById("result").innerHTML =
      `正解！<div class="explain">${q.explain}</div>`;
  }else{
    button.classList.add("wrong");
    document.getElementById("result").innerHTML =
      `不正解… 正解は「${q.answer}」<div class="explain">${q.explain}</div>`;
  }

  document.getElementById("score").textContent = `正解 ${score}`;

  setTimeout(() => {
    current++;
    if(current < questions.length){
      showQuestion();
    }else{
      finishGame();
    }
  }, 1700);
}

function finishGame(){
  document.getElementById("question").textContent =
    `50問終了！ ${score}問正解！`;

  document.getElementById("choices").innerHTML = "";

  let message = "";
  if(score >= 45){
    message = "歴史用語の魔導書を読み終えたレベル。完全に歴史の闇属性マスター！";
  }else if(score >= 30){
    message = "かなり詳しい！中二ワードに隠れた歴史の意味を見抜けています。";
  }else{
    message = "まだ封印が解けきっていません。もう一度挑戦して歴史用語を覚えよう！";
  }

  document.getElementById("result").innerHTML = message;
  document.getElementById("restart").style.display = "block";
}

function restartGame(){
  startGame();
}

startGame();
